[rewrite_local]
# 匹配 Wink 的两个核心用户信息接口
# 兼容 v3 和 api-cs 两个域名的匹配
[rewrite_local]
# 扫描全能王：解锁 VIP 属性 + 拦截任务余额 (覆盖 v3, api-cs, open 域名)
^https?:\/\/(v3\.camscanner\.com|api-cs\.intsig\.net|open\.camscanner\.com)\/.*(query_?property|upload_wps_pdf|sync|get_ad_control) url script-response-body https://raw.githubusercontent.com/bxy0128/bilibili-skipad/master/camscanner_v3.js
[mitm]
hostname = v3.camscanner.com, api-cs.intsig.net, open.camscanner.com
